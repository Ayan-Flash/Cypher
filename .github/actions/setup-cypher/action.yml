# cypher_change - new file
name: "Setup Cypher"
description: "Install Cypher CLI globally"
runs:
  using: "composite"
  steps:
    - name: Install Cypher CLI
      run: curl -fsSL https://cypher.ai/cli/install | bash
      shell: bash

    - name: Add Cypher to PATH
      run: echo "$HOME/.cypher/bin" >> $GITHUB_PATH
      shell: bash
