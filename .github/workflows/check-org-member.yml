name: check-org-member

on:
  workflow_call:
    inputs:
      username:
        required: true
        type: string
    secrets:
      cypher-maintainer-app-id:
        required: true
      cypher-maintainer-app-secret:
        required: true
    outputs:
      is-member:
        description: Whether the user is an org member or cypher-maintainer bot
        value: ${{ jobs.check.outputs['is-member'] }}

jobs:
  check:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      is-member: ${{ steps.check.outputs['is-member'] }}
    steps:
      - name: Create app token
        id: apptoken
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets['cypher-maintainer-app-id'] }}
          private-key: ${{ secrets['cypher-maintainer-app-secret'] }}
          owner: ${{ github.repository_owner }}

      - name: Check if author is org member or cypher bot
        id: check
        env:
          GITHUB_TOKEN: ${{ steps.apptoken.outputs.token }}
          USERNAME: ${{ inputs.username }}
        run: |
          if [[ "$USERNAME" == "cypher-maintainer[bot]" || "$USERNAME" == "cypherconnect[bot]" || "$USERNAME" == "cypherconnect-lite[bot]" ]]; then
            echo "is-member=true" >> "$GITHUB_OUTPUT"
            echo "User is a cypher bot"
          elif gh api orgs/Cypher-Org/members/"$USERNAME" --silent 2>/dev/null; then
            echo "is-member=true" >> "$GITHUB_OUTPUT"
            echo "User is an org member"
          else
            echo "is-member=false" >> "$GITHUB_OUTPUT"
            echo "User is not an org member"
          fi
