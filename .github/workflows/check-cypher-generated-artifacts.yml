# cypher_change - new file
name: Check Cypher generated artifacts

on:
  pull_request:
    paths:
      - ".gitignore"
      - ".github/workflows/check-cypher-generated-artifacts.yml"
      - ".cypher/**"
      - ".cypher/**"
      - "script/check-cypher-generated-artifacts.ts"
  workflow_dispatch:

jobs:
  check:
    name: Check Cypher generated artifacts
    if: github.repository == 'Cypher-Org/cypher'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6 # cypher_change
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: oven-sh/setup-bun@v2

      - name: Run check
        run: bun run script/check-cypher-generated-artifacts.ts
