name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: windows-x86_64
            ext: .zip
          - target: x86_64-apple-darwin
            os: macos-latest
            name: macos-x86_64
            ext: .tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            name: macos-aarch64
            ext: .tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-x86_64
            ext: .tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-aarch64
            ext: .tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile deps (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/cypher.exe -DestinationPath cypher-${{ matrix.name }}${{ matrix.ext }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          tar czf cypher-${{ matrix.name }}${{ matrix.ext }} -C target/${{ matrix.target }}/release cypher

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: cypher-${{ matrix.name }}${{ matrix.ext }}
          generate_release_notes: true
