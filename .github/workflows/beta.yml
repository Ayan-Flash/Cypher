name: beta

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  sync:
    if: github.repository == 'Cypher-Org/cypher'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6 # cypher_change
        with:
          persist-credentials: false # cypher_change
          fetch-depth: 0

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Setup Git Committer
        id: committer
        uses: ./.github/actions/setup-git-committer
        with:
          # cypher_change start
          cypher-maintainer-app-id: ${{ secrets.CYPHER_MAINTAINER_APP_ID }}
          cypher-maintainer-app-secret: ${{ secrets.CYPHER_MAINTAINER_APP_SECRET }}
          # cypher_change end

      - name: Sync beta branch
        env:
          GH_TOKEN: ${{ steps.committer.outputs.token }}
        run: bun script/beta.ts
